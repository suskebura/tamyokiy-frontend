<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | TAMYOKIY Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px;
        }
        .success-card {
            max-width: 550px;
            width: 100%;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 60px 50px;
            text-align: center;
            animation: fadeInUp 0.8s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #D4AF37, #FFD700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            animation: scaleIn 0.6s ease 0.3s both;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .success-icon i {
            font-size: 3.5rem;
            color: #050505;
        }
        .success-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #D4AF37;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        .success-subtitle {
            color: #b0b0b0;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .order-info {
            background: rgba(212, 175, 55, 0.06);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        .order-info .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .order-info .row:last-child { border-bottom: none; }
        .order-info .label { color: #888; font-size: 0.85rem; }
        .order-info .value { color: #fff; font-weight: 600; }
        .order-info .value.gold { color: #D4AF37; }
        
        .invoice-number {
            background: rgba(212, 175, 55, 0.15);
            padding: 8px 20px;
            border-radius: 8px;
            color: #D4AF37;
            font-weight: 700;
            display: inline-block;
            font-size: 1.1rem;
        }
        .btn-gold {
            background: linear-gradient(135deg, #D4AF37, #FFD700);
            border: none;
            color: #050505;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-gold:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.4);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #D4AF37;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-outline:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #D4AF37;
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
        }
        .status-msg {
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }
        .status-msg.show { display: block; }
        .status-msg.success {
            background: rgba(76,175,80,0.15);
            color: #4caf50;
            border: 1px solid rgba(76,175,80,0.3);
        }
        .status-msg.error {
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255,107,107,0.3);
        }
        .status-msg.info {
            background: rgba(212,175,55,0.15);
            color: #D4AF37;
            border: 1px solid rgba(212,175,55,0.3);
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            border-top-color: #D4AF37;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .nav-link { color: #e0e0e0; text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.3s; padding: 5px 0; }
        .nav-link:hover { color: #D4AF37; }
        .clean-nav {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            padding: 1rem 5%; background: rgba(0,0,0,0.92); backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(212,175,55,0.2);
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
        }
        .nav-brand { display: flex; align-items: center; gap: 12px; }
        .brand-logo-img { width: 45px; height: 45px; object-fit: contain; border-radius: 10px; }
        .brand-main { font-size: 1.2rem; font-weight: 800; color: #FFFFFF; }
        .brand-sub { font-size: 0.6rem; font-weight: 600; color: #D4AF37; letter-spacing: 1.5px; }
        .nav-links { display: flex; gap: 1.2rem; flex-wrap: wrap; align-items: center; }
        @media (max-width: 768px) {
            .success-card { padding: 35px 25px; }
            .button-group { flex-direction: column; }
            .btn-outline { margin-left: 0; }
            .order-info .row { flex-direction: column; text-align: center; gap: 4px; }
        }
    </style>
</head>
<body>
    <nav class="clean-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="logo.png" alt="TAMYOKIY Logistics Logo" class="brand-logo-img">
                <div class="brand-name">
                    <span class="brand-main">TAMYOKIY</span>
                    <span class="brand-sub">LOGISTICS INC.</span>
                </div>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="forecast.html" class="nav-link" id="forecastNavLink"><i class="fas fa-chart-line"></i> Forecast</a>
                <a href="#" id="authNavLink" class="nav-link">Login</a>
                <span id="userNameDisplay" style="display: none;"></span>
            </div>
        </div>
    </nav>

    <div class="success-card">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        <h1 class="success-title">Payment Successful! 🎉</h1>
        <p class="success-subtitle">Your payment has been processed successfully. Your shipment will be prepared for delivery.</p>

        <div class="order-info" id="orderInfo">
            <div class="row">
                <span class="label">📦 Tracking Number</span>
                <span class="value gold" id="trackingDisplay">Loading...</span>
            </div>
            <div class="row">
                <span class="label">💰 Amount Paid</span>
                <span class="value gold" id="amountDisplay">Loading...</span>
            </div>
            <div class="row">
                <span class="label">💳 Payment Method</span>
                <span class="value" id="methodDisplay">Loading...</span>
            </div>
            <div class="row">
                <span class="label">📄 Invoice</span>
                <span class="value" id="invoiceDisplay"><span class="spinner"></span> Generating...</span>
            </div>
        </div>

        <div id="statusMsg" class="status-msg"></div>

        <div class="button-group">
            <button onclick="location.href='dashboard.html'" class="btn-gold">
                <i class="fas fa-tachometer-alt"></i> Go to Dashboard
            </button>
            <button onclick="location.href='tracking.html'" class="btn-outline">
                <i class="fas fa-map-marker-alt"></i> Track Shipment
            </button>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        (function() {
            console.log('📄 Payment Success Page Initialized');

            // ===== GET PARAMETERS FROM URL =====
            const urlParams = new URLSearchParams(window.location.search);
            const trackingNumber = urlParams.get('tracking');
            const amount = urlParams.get('amount');
            const method = urlParams.get('method') || 'credit_card';

            console.log('📦 Params:', { trackingNumber, amount, method });

            // ===== UPDATE DISPLAY =====
            document.getElementById('trackingDisplay').innerText = trackingNumber || 'N/A';
            document.getElementById('amountDisplay').innerText = amount ? `$${parseFloat(amount).toFixed(2)}` : 'N/A';

            const methodNames = {
                credit_card: '💳 Credit Card',
                apple_pay: '🍎 Apple Pay',
                google_pay: '🔵 Google Pay',
                paypal: '💙 PayPal'
            };
            document.getElementById('methodDisplay').innerText = methodNames[method] || '💳 Credit Card';

            // ===== SHOW STATUS =====
            function showStatus(message, type = 'info') {
                const el = document.getElementById('statusMsg');
                el.className = `status-msg show ${type}`;
                el.textContent = message;
            }

            // ===== RECORD PAYMENT =====
            async function recordPayment() {
                const token = localStorage.getItem('token');
                const invoiceEl = document.getElementById('invoiceDisplay');

                console.log('🔑 Token exists:', !!token);

                if (!token) {
                    invoiceEl.innerHTML = '❌ Error: Not logged in';
                    showStatus('Please login again', 'error');
                    return;
                }

                if (!trackingNumber || !amount) {
                    invoiceEl.innerHTML = '❌ Error: Missing data';
                    showStatus('Missing shipment information', 'error');
                    return;
                }

                try {
                    console.log('📤 Calling /mock-success...');

                    const res = await fetch('http://localhost:5000/api/payment/mock-success', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            trackingNumber: trackingNumber,
                            amount: parseFloat(amount),
                            paymentMethod: method
                        })
                    });

                    const data = await res.json();
                    console.log('📥 Response:', data);

                    if (data.success) {
                        const invoiceNum = data.invoice?.number || '✅ Generated';
                        invoiceEl.innerHTML = invoiceNum;
                        showStatus(`✅ Invoice ${invoiceNum} generated successfully!`, 'success');
                    } else {
                        invoiceEl.innerHTML = '❌ Error';
                        showStatus('❌ ' + (data.message || 'Unknown error'), 'error');
                    }
                } catch (error) {
                    console.error('❌ Error:', error);
                    invoiceEl.innerHTML = '❌ Connection Error';
                    showStatus('❌ Cannot connect to server. Make sure backend is running.', 'error');
                }
            }

            // ===== RUN =====
            setTimeout(recordPayment, 500);
        })();
    </script>
</body>
</html>
